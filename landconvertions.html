<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Land Units Conversion</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #000129;
            color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .hero {
            flex: 1;
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 400px;
            width: 100%;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #0a0e3f;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .logo {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 100px;
            height: auto;
        }
        h1 {
            color: yellow;
            text-align: center;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            color: #fff;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background-color: #000129;
            color: #fff;
            border: 1px solid #fff;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .swap-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 15px;
        }
        .unit-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-right: 10px;
        }
        .swap-button-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            margin: 0 10px;
        }
        .swap-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: yellow;
            color: #000129;
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .swap-button:hover {
            background-color: #ffeb3b;
        }
        button.convert {
            margin-top: 20px;
            padding: 10px;
            width: 100%;
            background-color: yellow;
            color: #000129;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button.convert:hover {
            background-color: #ffeb3b;
        }
        .result {
            margin-top: 20px;
            font-size: 1.2em;
            color: yellow;
            text-align: center;
        }
        footer {
            background-color: #0a0e3f;
            text-align: center;
            padding: 10px 0;
            font-size: 20px;
            color: #fff;
            flex-shrink: 0; /* Prevent footer from shrinking */
        }
        footer .descnote {
            background: linear-gradient(to right, #ffffff, #ffff80, #ffffff);
            -webkit-background-clip: text;
            color: transparent;
        }
        a{
            color: yellow;
        }
        a:hover{
            color: red;
        }
    </style>
</head>
<body>
    <div class="hero">
        <header>
            <img onclick="window.location.href='https://sgs-goudham-portfolio.vercel.app'" class="logo" src="asserts/logo.png" alt="Logo">
        </header>
        <div class="container">
            <h1>Land Units Conversion Tool</h1>
            <label for="inputValue">Enter value:</label>
            <input type="number" id="inputValue" placeholder="Enter value">

            <div class="swap-container">
                <div class="unit-container">
                    <label for="inputUnit">From:</label>
                    <select id="inputUnit">
                        <option value="" disabled selected>Select Unit</option>
                        <option value="squareMeters">Square Meters</option>
                        <option value="hectares">Hectares</option>
                        <option value="acres">Acres</option>
                        <option value="squareFeet">Square Feet</option>
                        <option value="cent">Cent</option>
                    </select>
                </div>
                <div class="swap-button-container">
                    <button class="swap-button" onclick="swapUnits()">↔️</button>
                </div>
                <div class="unit-container">
                    <label for="outputUnit">To:</label>
                    <select id="outputUnit">
                        <option value="" disabled selected>Select Unit</option>
                        <option value="squareMeters">Square Meters</option>
                        <option value="hectares">Hectares</option>
                        <option value="acres">Acres</option>
                        <option value="squareFeet">Square Feet</option>
                        <option value="cent">Cent</option>
                    </select>
                </div>
            </div>

            <button class="convert" onclick="convert()">Convert</button>

            <div class="result" id="result"></div>
        </div>
    </div>
    <footer>
        <p class="descnote">&copy; 2024 SGS_Goudham.All Rights Reserved</p>
        <a href="https://sgs-goudham-portfolio.vercel.app">Contant</a>
    </footer>
    <script>
        function convert() {
            const inputValue = parseFloat(document.getElementById('inputValue').value);
            const inputUnit = document.getElementById('inputUnit').value;
            const outputUnit = document.getElementById('outputUnit').value;
            
            if (isNaN(inputValue)) {
                document.getElementById('result').textContent = 'Please enter a valid number.';
                return;
            }

            if (!inputUnit || !outputUnit) {
                document.getElementById('result').textContent = 'Please select both units.';
                return;
            }

            const conversionFactors = {
                squareMeters: {
                    squareMeters: 1,
                    hectares: 0.0001,
                    acres: 0.000247105,
                    squareFeet: 10.7639,
                    cent: 0.0247105
                },
                hectares: {
                    squareMeters: 10000,
                    hectares: 1,
                    acres: 2.47105,
                    squareFeet: 107639,
                    cent: 247.105
                },
                acres: {
                    squareMeters: 4046.86,
                    hectares: 0.404686,
                    acres: 1,
                    squareFeet: 43560,
                    cent: 100
                },
                squareFeet: {
                    squareMeters: 0.092903,
                    hectares: 0.0000092903,
                    acres: 0.0000229568,
                    squareFeet: 1,
                    cent: 0.00229568
                },
                cent: {
                    squareMeters: 40.4686,
                    hectares: 0.00404686,
                    acres: 0.01,
                    squareFeet: 435.6,
                    cent: 1
                }
            };

            const result = inputValue * conversionFactors[inputUnit][outputUnit];
            document.getElementById('result').textContent = `${inputValue} ${inputUnit} is equal to ${result.toFixed(4)} ${outputUnit}`;
        }

        function swapUnits() {
            const inputUnit = document.getElementById('inputUnit');
            const outputUnit = document.getElementById('outputUnit');
            const temp = inputUnit.value;
            inputUnit.value = outputUnit.value;
            outputUnit.value = temp;
        }
    </script>
</body>
</html>
